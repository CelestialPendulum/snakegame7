<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Snake Pro - Fixed & Immersive</title>
    <style>
        :root {
            --bg: #020617;
            --snake: #10b981;
            --food: #f43f5e;
            --ui-bg: #1e293b;
        }

        body {
            margin: 0; padding: 0; background: var(--bg);
            color: white; font-family: sans-serif;
            height: 100vh; display: flex; flex-direction: column;
            justify-content: center; align-items: center; overflow: hidden;
        }

        /* Full Screen Disco Flash */
        #flash-overlay {
            position: fixed; top:0; left:0; width:100%; height:100%;
            pointer-events: none; background: white; opacity: 0; z-index: 1;
        }

        .stats {
            background: var(--ui-bg); padding: 15px 40px; border-radius: 15px;
            display: flex; gap: 30px; margin-bottom: 20px; z-index: 2;
        }

        .board-container {
            position: relative; border: 4px solid #334155;
            background: black; border-radius: 10px; z-index: 2;
            box-shadow: 0 0 20px rgba(0,0,0,0.5);
        }

        canvas { display: block; background: #000; }

        .overlay {
            position: absolute; top: 0; left:0; width:100%; height:100%;
            background: rgba(0,0,0,0.8); display: flex; flex-direction: column;
            justify-content: center; align-items: center; border-radius: 6px;
        }

        button {
            padding: 15px 30px; font-size: 18px; font-weight: bold;
            background: var(--snake); color: white; border: none;
            border-radius: 8px; cursor: pointer;
        }
    </style>
</head>
<body>
    <div id="flash-overlay"></div>

    <div class="stats">
        <div>SCORE: <span id="score">0</span></div>
        <div>BEST: <span id="high">0</span></div>
    </div>

    <div class="board-container">
        <canvas id="game"></canvas>
        <div id="menu" class="overlay">
            <h1 id="title">SNAKE PRO</h1>
            <button onclick="initGame()">START GAME</button>
        </div>
    </div>

    <script>
        const canvas = document.getElementById('game');
        const ctx = canvas.getContext('2d');
        const flash = document.getElementById('flash-overlay');
        
        // Settings
        const grid = 20; 
        const cols = 40; 
        const rows = 22; 
        canvas.width = cols * grid;
        canvas.height = rows * grid;

        let snake, food, dx, dy, score, loop, audioCtx;

        // Audio System
        function playEatSound() {
            if (!audioCtx) audioCtx = new (window.AudioContext || window.webkitAudioContext)();
            if (audioCtx.state === 'suspended') audioCtx.resume();

            const osc = audioCtx.createOscillator();
            const gain = audioCtx.createGain();
            
            osc.type = 'square';
            osc.frequency.setValueAtTime(440, audioCtx.currentTime); // A4
            osc.frequency.exponentialRampToValueAtTime(880, audioCtx.currentTime + 0.1); // Slide up to A5
            
            gain.gain.setValueAtTime(0.1, audioCtx.currentTime);
            gain.gain.exponentialRampToValueAtTime(0.01, audioCtx.currentTime + 0.1);
            
            osc.connect(gain);
            gain.connect(audioCtx.destination);
            osc.start();
            osc.stop(audioCtx.currentTime + 0.1);
        }

        function triggerDisco() {
            flash.style.background = `hsl(${Math.random() * 360}, 70%, 50%)`;
            flash.style.opacity = "0.3";
            setTimeout(() => flash.style.opacity = "0", 150);
        }

        function initGame() {
            snake = [{x: 10, y: 10}, {x: 9, y: 10}, {x: 8, y: 10}];
            food = {x: 25, y: 10};
            dx = 1; dy = 0; score = 0;
            document.getElementById('score').innerText = score;
            document.getElementById('menu').style.display = 'none';
            if(loop) clearInterval(loop);
            loop = setInterval(step, 100);
        }

        function step() {
            // Move Snake
            const head = {x: snake[0].x + dx, y: snake[0].y + dy};

            // Wall Collision
            if (head.x < 0 || head.x >= cols || head.y < 0 || head.y >= rows) return gameOver();
            
            // Self Collision
            for (let i = 0; i < snake.length; i++) {
                if (snake[i].x === head.x && snake[i].y === head.y) return gameOver();
            }

            snake.unshift(head);

            // Eat Food
            if (head.x === food.x && head.y === food.y) {
                score += 10;
                document.getElementById('score').innerText = score;
                playEatSound();
                triggerDisco();
                food = {
                    x: Math.floor(Math.random() * cols),
                    y: Math.floor(Math.random() * rows)
                };
            } else {
                snake.pop();
            }

            draw();
        }

        function draw() {
            // Background
            ctx.fillStyle = "black";
            ctx.fillRect(0, 0, canvas.width, canvas.height);

            // Food
            ctx.fillStyle = "#f43f5e";
            ctx.fillRect(food.x * grid + 2, food.y * grid + 2, grid - 4, grid - 4);

            // Snake
            snake.forEach((part, index) => {
                ctx.fillStyle = index === 0 ? "#10b981" : "#34d399";
                ctx.fillRect(part.x * grid + 1, part.y * grid + 1, grid - 2, grid - 2);
            });
        }

        function gameOver() {
            clearInterval(loop);
            document.getElementById('title').innerText = "GAME OVER";
            document.getElementById('menu').style.display = 'flex';
            const high = localStorage.getItem('snakeBest') || 0;
            if (score > high) localStorage.setItem('snakeBest', score);
            document.getElementById('high').innerText = localStorage.getItem('snakeBest');
        }

        window.onkeydown = (e) => {
            if (audioCtx && audioCtx.state === 'suspended') audioCtx.resume();
            switch(e.key) {
                case 'ArrowUp': case 'w': if(dy===0) {dx=0; dy=-1;} break;
                case 'ArrowDown': case 's': if(dy===0) {dx=0; dy=1;} break;
                case 'ArrowLeft': case 'a': if(dx===0) {dx=-1; dy=0;} break;
                case 'ArrowRight': case 'd': if(dx===0) {dx=1; dy=0;} break;
            }
        };

        document.getElementById('high').innerText = localStorage.getItem('snakeBest') || 0;
    </script>
</body>
</html>
